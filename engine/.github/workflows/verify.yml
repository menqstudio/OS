name: verify
on:
  push:
    branches: [bro-agent-os-v1, main]
  pull_request:
# Least privilege: the workflow only reads the repo and uploads a run artifact
# (which uses the runtime token, not GITHUB_TOKEN). Deny everything else by default.
permissions:
  contents: read
# One in-flight run per ref; a new push supersedes and cancels the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  foundation:
    # A hung step must not hold a runner for the 6-hour default.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      # Third-party actions are pinned to a full commit SHA (a tag is mutable and a
      # compromised tag would run attacker code in CI); the comment tracks the version.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install schema validator and signature library
        # --require-hashes: every wheel (and its full transitive closure) must match a
        # sha256 pinned in requirements-ci.txt, so a compromised or substituted package
        # cannot enter the build. See requirements-ci.txt for how the digests are sourced.
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-ci.txt
      - name: Validate foundation
        # The operator-root trust anchor is pinned from OUTSIDE the registry
        # (security remediation blocker 2). CI supplies it via the env pin — this is
        # the committed registry's operator public key (public, safe to commit); if
        # the registry's operator key is ever rotated without updating this pin, the
        # foundation validation fails closed, which is the point of the pin.
        run: python tools/bro_validate.py
        env:
          # The raw operator-root pin is honoured only when the workflow marks the
          # environment as CI (remediation M-1); without BRO_ENV=ci the validator
          # fails closed and refuses the env pin. Set by workflow configuration
          # here, never by an ambient/attacker env.
          BRO_ENV: ci
          BRO_OPERATOR_ROOT_PUBKEY: 7231f58d738616115dcd2a71502360331076465f253b3723c8db9be01361df3c
      - name: Run policy tests
        # The full-flow completion-gate tests exercise the REAL committed operator
        # registry (not an ephemeral per-fixture key), so they need the same CI pin
        # and BRO_ENV=ci the validator does; ephemeral-key tests override it locally.
        run: python -m unittest discover -s tests -v
        env:
          BRO_ENV: ci
          BRO_OPERATOR_ROOT_PUBKEY: 7231f58d738616115dcd2a71502360331076465f253b3723c8db9be01361df3c
      - name: Compile Python
        run: python -m compileall -q runtime tools tests
      - name: Assure live wiring
        # The assurance validator runs each law's allow/deny cases through the WIRED
        # interpreter named in .claude/settings.json and requires the wired hook to
        # actually deny — proving enforcement is live, not that files merely exist. It
        # exits non-zero on any dead wiring. Runs on EVERY matrix OS: Windows is where
        # bare `python3` wiring resolved to a dead Store alias and failed OPEN, so the
        # Windows leg is the regression gate that turns fail-open wiring into a red build.
        run: python tools/bro_live_validate.py
      - name: Build canonical audit snapshot
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          snapshot="$RUNNER_TEMP/bro-audit-snapshot.tgz"
          tar --exclude=.git --exclude='*/__pycache__' --exclude='*.pyc' -czf "$snapshot" .
          mv "$snapshot" bro-audit-snapshot.tgz
      - name: Upload canonical audit snapshot
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bro-audit-snapshot
          path: bro-audit-snapshot.tgz
          retention-days: 1
          if-no-files-found: error
