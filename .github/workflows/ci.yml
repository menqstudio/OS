name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Typecheck + build
        run: npm run build

  data-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test the SQLite data core
        run: cargo test -p brops-core --manifest-path src-tauri/Cargo.toml

  desktop-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install webview system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build frontend (embedded by Tauri)
        run: npm run build
      - name: Build the Tauri host
        run: cargo build --manifest-path src-tauri/Cargo.toml
      - name: Test the Tauri host (filesystem browser, etc.)
        run: cargo test -p brops --lib --manifest-path src-tauri/Cargo.toml
