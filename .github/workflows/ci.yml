name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Phase 0: each half builds and tests independently. A cross-integration
# (bridge) smoke test is added in Phase 1.
jobs:
  cockpit-frontend:
    name: Cockpit · frontend (typecheck + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test

  cockpit-core:
    name: Cockpit · SQLite data core (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Test the SQLite data core
        run: cargo test -p brops-core --manifest-path apps/desktop/src-tauri/Cargo.toml

  cockpit-host:
    name: Cockpit · Tauri host (cargo check + ai tests)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf build-essential curl wget file libssl-dev libxdo-dev
      - name: Compile the Tauri host crate
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Test the host crate (ai.rs governed/receipt unit tests)
        run: cargo test -p brops --manifest-path apps/desktop/src-tauri/Cargo.toml

  engine:
    name: Engine · governance runtime (python)
    runs-on: ubuntu-latest
    env:
      BRO_ENV: ci
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install engine CI dependencies
        run: pip install --require-hashes -r requirements-ci.txt
      - name: Run the engine test suite
        run: python -m unittest discover -s tests

  bridge:
    name: Bridge · engine adapter (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install bridge test dependencies (jsonschema, hash-pinned via engine)
        run: pip install --require-hashes -r engine/requirements-ci.txt
      - name: Run the bridge adapter tests
        working-directory: bridge
        run: python -m unittest discover -s tests

  coordination:
    name: Coordination · docs consistency gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      # Stdlib only — no dependencies. Fail-closed: malformed / structurally
      # inconsistent coordination docs cannot merge.
      - name: Coordination-docs consistency gate
        run: python tools/check_coordination.py
      - name: Gate self-tests
        working-directory: tools
        run: python -m unittest test_check_coordination

  capabilities:
    name: Capability · inventory gate (T-010)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      # Stdlib only. Fail-closed: registered (lib.rs) == AppManifest (build.rs) ==
      # capability-policy inventory == capability grants (default.json). A command
      # added in one place but not the others — or ungated — cannot merge.
      - name: Capability inventory consistency gate
        run: python tools/check_capabilities.py
      - name: Gate self-tests
        working-directory: tools
        run: python -m unittest test_check_capabilities
