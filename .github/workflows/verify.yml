name: verify

on:
  push:
    branches: [bro-agent-os-v1, main]
  pull_request:

jobs:
  foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate foundation
        run: python tools/bro_validate.py
      - name: Run policy tests
        run: python -m unittest discover -s tests -v
      - name: Build canonical audit snapshot
        if: always()
        shell: bash
        run: |
          snapshot="${RUNNER_TEMP}/bro-audit-snapshot.tgz"
          rm -f "$snapshot" "$GITHUB_WORKSPACE/bro-audit-snapshot.tgz"
          tar \
            --exclude=.git \
            --exclude=bro-audit-snapshot.tgz \
            --exclude='*/__pycache__' \
            --exclude='*.pyc' \
            -czf "$snapshot" .
          mv "$snapshot" "$GITHUB_WORKSPACE/bro-audit-snapshot.tgz"
      - name: Upload canonical audit snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bro-audit-snapshot
          path: bro-audit-snapshot.tgz
          retention-days: 1
          if-no-files-found: error
